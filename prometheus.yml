global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: production
    project: mustafa-academy

# Alertmanager (configure when needed)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

scrape_configs:
  # ── API application metrics ───────────────────────────────────
  - job_name: 'academy-api'
    static_configs:
      - targets: ['api:3000']
    metrics_path: /metrics
    scrape_interval: 10s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'academy-api'

  # ── Redis exporter ────────────────────────────────────────────
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    # Requires redis_exporter sidecar — add to docker-compose if needed

  # ── Postgres exporter ─────────────────────────────────────────
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
    # Requires postgres_exporter sidecar — add to docker-compose if needed

  # ── Nginx metrics ─────────────────────────────────────────────
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:9113']
    # Requires nginx-prometheus-exporter

  # ── Prometheus self-monitoring ────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

rule_files:
  - 'alerts/*.yml'
