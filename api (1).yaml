apiVersion: v1
kind: Service
metadata:
  name: academy-api
  namespace: mustafa-academy
  labels:
    app.kubernetes.io/name: mustafa-academy
    app.kubernetes.io/component: api
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "3000"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  selector:
    app: academy-api
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
