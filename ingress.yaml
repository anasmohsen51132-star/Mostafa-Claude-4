apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: academy-ingress
  namespace: mustafa-academy
  labels:
    app.kubernetes.io/name: mustafa-academy
    app.kubernetes.io/component: ingress
  annotations:
    # NGINX Ingress Controller
    kubernetes.io/ingress.class: "nginx"

    # SSL/TLS
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "60"
    nginx.ingress.kubernetes.io/limit-connections: "20"

    # Body size for file uploads (500MB)
    nginx.ingress.kubernetes.io/proxy-body-size: "512m"

    # Timeouts
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"

    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header X-Frame-Options "DENY" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # CORS for API (handled by Express, but allow at ingress for OPTIONS preflight)
    nginx.ingress.kubernetes.io/enable-cors: "false"

    # Preserve real client IP
    nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
    nginx.ingress.kubernetes.io/compute-full-forwarded-for: "true"

spec:
  tls:
    - hosts:
        - academy.example.com
        - api.academy.example.com
      secretName: academy-tls-cert

  rules:
    # ── Frontend ──────────────────────────────────────────────
    - host: academy.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: academy-web
                port:
                  name: http

    # ── API ───────────────────────────────────────────────────
    - host: api.academy.example.com
      http:
        paths:
          # Webhooks — raw body, no buffering
          - path: /webhooks
            pathType: Prefix
            backend:
              service:
                name: academy-api
                port:
                  name: http

          # Metrics — restricted in production (use NetworkPolicy)
          - path: /metrics
            pathType: Exact
            backend:
              service:
                name: academy-api
                port:
                  name: http

          # All other API routes
          - path: /
            pathType: Prefix
            backend:
              service:
                name: academy-api
                port:
                  name: http

---
# NetworkPolicy — restrict metrics endpoint to monitoring namespace only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: academy-api-metrics-policy
  namespace: mustafa-academy
spec:
  podSelector:
    matchLabels:
      app: academy-api
  policyTypes:
    - Ingress
  ingress:
    # Allow all traffic on port 3000 from within cluster
    - ports:
        - port: 3000
