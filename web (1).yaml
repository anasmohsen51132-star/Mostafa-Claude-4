apiVersion: v1
kind: Service
metadata:
  name: academy-web
  namespace: mustafa-academy
  labels:
    app.kubernetes.io/name: mustafa-academy
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  selector:
    app: academy-web
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
