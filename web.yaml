apiVersion: apps/v1
kind: Deployment
metadata:
  name: academy-web
  namespace: mustafa-academy
  labels:
    app.kubernetes.io/name: mustafa-academy
    app.kubernetes.io/component: web
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: academy-web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: academy-web
        app.kubernetes.io/component: web
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: academy-web

      containers:
        - name: web
          image: ghcr.io/mustafa-academy/web:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3

          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false   # nginx writes to /tmp, /var/cache
            runAsNonRoot: true
            runAsUser: 101                  # nginx user
            capabilities:
              drop: ["ALL"]

      imagePullSecrets:
        - name: ghcr-registry-secret

---
# ServiceAccount for web (no permissions needed)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: academy-web
  namespace: mustafa-academy
  labels:
    app.kubernetes.io/name: mustafa-academy
    app.kubernetes.io/component: web
automountServiceAccountToken: false
